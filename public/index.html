<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>LiveBoard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ════════ LANDING PAGE ════════ -->
<div id="landing">
  <div class="landing-card">
    <div class="landing-icon">🎨</div>
    <h1>LiveBoard</h1>
    <p>Real-time collaborative whiteboard.<br/>Draw, write, and create together — live!</p>
    <button id="createBtn" class="big-btn">✨ Create New Board</button>
    <div class="divider">or join an existing board</div>
    <div class="join-row">
      <input type="text" id="joinInput" placeholder="Paste room code..." />
      <button id="joinBtn" class="big-btn secondary">Join →</button>
    </div>
  </div>
</div>

<!-- ════════ BOARD PAGE ════════ -->
<div id="board" class="hidden">

  <!-- Top Bar -->
  <header id="topbar">
    <div class="tb-left">
      <span class="logo">🎨 LiveBoard</span>
      <span class="badge" id="onlineBadge">● <span id="onlineNum">1</span> online</span>
    </div>
    <div class="tb-right">
      <button id="shareBtn" class="tb-btn accent">🔗 Share Link</button>
      <button id="undoBtn" class="tb-btn">↩ Undo</button>
      <button id="clearBtn" class="tb-btn danger">🗑 Clear</button>
      <button id="downloadBtn" class="tb-btn">💾 Save</button>
    </div>
  </header>

  <!-- Toolbar -->
  <aside id="toolbar">
    <div class="sec">
      <div class="sec-title">TOOLS</div>
      <div class="tool-row">
        <button class="tool active" data-tool="pen" title="Pen (P)">✏️</button>
        <button class="tool" data-tool="eraser" title="Eraser (E)">🧹</button>
        <button class="tool" data-tool="text" title="Text (T)">🔤</button>
        <button class="tool" data-tool="line" title="Line (L)">╱</button>
        <button class="tool" data-tool="rect" title="Rectangle (R)">▭</button>
        <button class="tool" data-tool="circle" title="Circle (C)">◯</button>
        <button class="tool" data-tool="arrow" title="Arrow (A)">→</button>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">COLOR</div>
      <div class="color-row">
        <button class="clr active" data-c="#000000" style="background:#000"></button>
        <button class="clr" data-c="#ef4444" style="background:#ef4444"></button>
        <button class="clr" data-c="#f97316" style="background:#f97316"></button>
        <button class="clr" data-c="#eab308" style="background:#eab308"></button>
        <button class="clr" data-c="#22c55e" style="background:#22c55e"></button>
        <button class="clr" data-c="#3b82f6" style="background:#3b82f6"></button>
        <button class="clr" data-c="#8b5cf6" style="background:#8b5cf6"></button>
        <button class="clr" data-c="#ec4899" style="background:#ec4899"></button>
        <button class="clr" data-c="#06b6d4" style="background:#06b6d4"></button>
        <button class="clr" data-c="#ffffff" style="background:#fff;border:2px solid #ccc"></button>
      </div>
      <input type="color" id="colorPick" value="#000000"/>
    </div>
    <div class="sec">
      <div class="sec-title">SIZE · <span id="sizeVal">4</span>px</div>
      <input type="range" id="sizeSlider" min="1" max="40" value="4"/>
    </div>
    <div class="sec">
      <div class="sec-title">OPACITY · <span id="opVal">100</span>%</div>
      <input type="range" id="opSlider" min="10" max="100" value="100"/>
    </div>
    <div class="sec" id="fontSec" style="display:none">
      <div class="sec-title">FONT · <span id="fontVal">24</span>px</div>
      <input type="range" id="fontSlider" min="12" max="72" value="24"/>
    </div>
  </aside>

  <!-- Canvas Area -->
  <main id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <canvas id="previewCanvas"></canvas>
    <div id="cursorLayer"></div>
    <textarea id="textBox" class="hidden"></textarea>
  </main>

</div><!-- /board -->

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
